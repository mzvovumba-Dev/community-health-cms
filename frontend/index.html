<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clinic Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <div class="card shadow p-4" style="width: 400px;">
    <div class="text-center mb-4">
      <h4 class="fw-bold text-primary">Community Health Clinic</h4>
      <p class="text-muted">Management System</p>
    </div>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" placeholder="Enter your username"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" placeholder="Enter your password"/>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="remember"/>
      <label class="form-check-label" for="remember">Remember me</label>
    </div>

    <a href="patients.html" class="btn btn-primary w-100">Login</a>

    <p class="text-center text-muted mt-3" style="font-size: 13px;">
      Community Health Clinic Management System v1.0
    </p>
  </div>

</body>
</html>
