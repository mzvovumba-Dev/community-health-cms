<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clinic Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <div class="card shadow p-4" style="width: 400px;">
    <div class="text-center mb-4">
      <h4 class="fw-bold text-primary">Community Health Clinic</h4>
      <p class="text-muted">Management System</p>
    </div>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" id="username" placeholder="Enter your username"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter your password"/>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="remember"/>
      <label class="form-check-label" for="remember">Remember me</label>
    </div>

    <!-- Error message -->
    <div id="errorMsg" class="alert alert-danger d-none">
      Invalid username or password!
    </div>

    <button onclick="login()" class="btn btn-primary w-100">Login</button>

    <p class="text-center text-muted mt-3" style="font-size: 13px;">
      Community Health Clinic Management System v1.0
    </p>
  </div>

  <script>
    function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      // Valid credentials
      if (username === "admin" && password === "admin123") {
        window.location.href = "patients.html";
      } else {
        document.getElementById("errorMsg").classList.remove("d-none");
      }
    }
  </script>

</body>
</html>
