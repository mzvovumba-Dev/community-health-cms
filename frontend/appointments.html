<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Appointments — Clinic Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">Community Health Clinic</span>
    <div class="ms-auto">
      <a href="index.html" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">

      <!-- Sidebar -->
      <div class="col-md-2 bg-white sidebar py-4 shadow-sm min-vh-100">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link text-dark" href="patients.html">Patients</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active fw-bold text-primary" href="appointments.html">Appointments</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" href="#">Medical Records</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" href="#">Staff</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" href="#">Reports</a>
          </li>
        </ul>
      </div>

      <!-- Main Content -->
      <div class="col-md-10 py-4 px-4">
        <div class="card shadow">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">Appointments</h5>
            <button class="btn btn-primary btn-sm">+ New Appointment</button>
          </div>
          <div class="card-body">
            <table class="table table-hover table-bordered">
              <thead class="table-primary">
                <tr>
                  <th>ID</th>
                  <th>Patient Name</th>
                  <th>Doctor</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>A001</td>
                  <td>Thandiwe Mokoena</td>
                  <td>Dr. Fatima Patel</td>
                  <td>2026-05-21</td>
                  <td>09:00</td>
                  <td><span class="badge bg-success">Confirmed</span></td>
                  <td>
                    <button class="btn btn-sm btn-warning">Edit</button>
                    <button class="btn btn-sm btn-danger">Cancel</button>
                  </td>
                </tr>
                <tr>
                  <td>A002</td>
                  <td>Sipho Dlamini</td>
                  <td>Nurse Bongani Zulu</td>
                  <td>2026-05-21</td>
                  <td>10:30</td>
                  <td><span class="badge bg-warning text-dark">Pending</span></td>
                  <td>
                    <button class="btn btn-sm btn-warning">Edit</button>
                    <button class="btn btn-sm btn-danger">Cancel</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
